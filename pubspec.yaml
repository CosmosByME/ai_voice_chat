name: ai_voice_chat
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.12.2
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_onnxruntime: ^1.8.0
  just_audio: ^0.10.5
  shared_preferences: ^2.5.5
  http: ^1.6.0
  path_provider: ^2.1.6
  characters: ^1.4.1
  get_it: ^9.2.1
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  meta: ^1.18.0
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/voices/

  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
